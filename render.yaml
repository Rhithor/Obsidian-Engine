services:
  - type: web
    name: obsidian-engine-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: CHROMA_PATH
        value: ./chroma_data
      - key: CHUNK_SIZE
        value: "1000"
      - key: CHUNK_OVERLAP
        value: "200"
      - key: N_RESULTS
        value: "5"
      - key: MAX_FILE_SIZE_MB
        value: "50"
      # Set these in Render dashboard (sensitive values):
      # GROQ_API_KEY
      # ALLOWED_ORIGINS
