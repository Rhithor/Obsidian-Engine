services:
  - type: web
    name: obsidian-engine-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: CHROMA_PATH
        value: ./chroma_data
      - key: CHUNK_SIZE
        value: "1000"
      - key: CHUNK_OVERLAP
        value: "200"
      - key: N_RESULTS
        value: "5"
      - key: MAX_FILE_SIZE_MB
        value: "50"
      # Set these in Render dashboard (sensitive):
      # GROQ_API_KEY
      # ALLOWED_ORIGINS
